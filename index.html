<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Tape — multi-track recorder</title>
<style>
  :root {
    --bg:#0c0b0a; --panel:#1c1a17; --border:#34302a; --text:#ede4d3; --dim:#948a78;
    --amber:#e8a33d; --red:#c0392b; --red-dim:rgba(192,57,43,.35);
    --teal:#2f4a48; --teal-light:#cde8e0; --row-h:64px;
  }
  * { box-sizing:border-box; -webkit-user-select:none; user-select:none; }
  html,body { margin:0; padding:0; background:var(--bg); color:var(--text);
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; -webkit-tap-highlight-color:transparent; }
  .wrap { max-width:900px; margin:0 auto; padding:0 14px 48px; }
  h1 { font-size:15px; letter-spacing:.15em; text-transform:uppercase; color:var(--amber); margin:0 0 4px; }
  .sub { font-size:12px; color:var(--dim); margin:0 0 18px; }
  .notice { display:none; gap:8px; align-items:flex-start; background:rgba(192,57,43,.12);
    border:1px solid var(--red); color:#f0c9c0; font-size:13px; padding:10px 12px; border-radius:8px; margin-bottom:16px; }
  .notice.show { display:flex; }
  .sticky-header-block { position:sticky; top:0; z-index:30; background:var(--bg); padding-top:14px; }
  .transport { display:flex; align-items:center; gap:10px; background:var(--panel);
    border:1px solid var(--border); border-radius:12px; padding:6px 12px; margin-bottom:14px; }
  .tape-title-block { display:flex; flex-direction:column; align-items:flex-start; line-height:1.15; }
  .tape-title { font-weight:700; font-size:14px; text-transform:uppercase; letter-spacing:.1em; color:var(--amber); white-space:nowrap; }
  .tape-version { font-size:12px; color:var(--dim); }
  .tbtn { width:50px; height:50px; border-radius:50%; border:none; flex-shrink:0; cursor:pointer;
    display:flex; align-items:center; justify-content:center; font-size:18px; }
  #recordBtn { background:var(--red); color:var(--text); }
  #recordBtn.recording { background:var(--amber); color:#1c1a17; }
  #playBtn { background:var(--teal); color:var(--teal-light); }
  .tbtn:disabled { opacity:.3; cursor:not-allowed; }
  .timer-inline { font-size:13px; font-variant-numeric:tabular-nums; white-space:nowrap; margin-left:auto; }
  .meter-vertical { width:8px; height:50px; background:var(--border); border-radius:4px; overflow:hidden;
    display:flex; align-items:flex-end; flex-shrink:0; }
  .meter-vertical #meterFill { width:100%; height:0%; background:var(--amber); }
  .gain-knob { width:50px; height:50px; border-radius:50%; background:var(--panel); border:2px solid var(--border);
    position:relative; cursor:pointer; flex-shrink:0; touch-action:none; }
  .gain-knob-indicator { position:absolute; width:3px; height:18px; background:var(--amber); left:50%; top:4px;
    margin-left:-1.5px; border-radius:2px; transform-origin:50% 21px; }
  #savedTag { font-size:10px; color:var(--dim); text-transform:uppercase; opacity:0; transition:opacity .3s; }
  .section-row { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:8px; }
  .section-label { font-size:11px; color:var(--dim); text-transform:uppercase; letter-spacing:.05em; }
  .v-divider { width:1px; height:24px; background:var(--border); flex-shrink:0; }
  #addTrackBtn { background:var(--panel); border:1px solid var(--border); color:var(--amber);
    font-size:11px; padding:4px 10px; border-radius:6px; cursor:pointer; text-transform:uppercase; letter-spacing:.05em; }

  .mixer-ruler-row { display:flex; border:1px solid var(--border); border-bottom:none; border-radius:12px 12px 0 0; overflow:hidden; background:var(--panel); }
  .headers-col-spacer { width:140px; flex-shrink:0; border-right:1px solid var(--border); }
  #rulerOuter { flex:1; overflow:hidden; position:relative; }
  .mixer { display:flex; border:1px solid var(--border); border-top:none; border-radius:0 0 12px 12px; overflow:hidden; }
  .headers-col { width:140px; flex-shrink:0; background:var(--panel); border-right:1px solid var(--border); }
  .track-header { height:var(--row-h); border-bottom:1px solid var(--border); padding:8px 8px;
    display:flex; flex-direction:column; justify-content:flex-start; gap:8px; }
  .track-header:last-child { border-bottom:none; }
  .th-top { display:flex; align-items:center; gap:6px; }
  .th-name { font-size:11px; flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .arm-btn { width:16px; height:16px; border-radius:50%; border:1px solid var(--red); background:transparent; flex-shrink:0; cursor:pointer; padding:0; }
  .arm-btn.armed { background:var(--red); }
  .th-controls { display:flex; align-items:center; gap:4px; }
  .ms-btn { width:22px; height:20px; border-radius:4px; border:1px solid var(--border); background:transparent;
    color:var(--dim); font-size:10px; cursor:pointer; flex-shrink:0; }
  .ms-btn.mute-on { background:var(--red); color:var(--text); border-color:var(--red); }
  .ms-btn.solo-on { background:var(--amber); color:#1c1a17; border-color:var(--amber); }
  .vol-slider { flex:1; min-width:0; height:16px; }

  #timelineOuter { flex:1; overflow-x:auto; background:var(--panel); touch-action:pan-x pan-y; }
  #timelineInner { position:relative; }
  #ruler { position:relative; height:26px; border-bottom:1px solid var(--border); cursor:pointer; box-sizing:border-box; }
  .tick { position:absolute; top:0; bottom:0; width:1px; background:#524c40; }
  .tick-label { position:absolute; top:2px; font-size:11px; color:var(--dim); }
  #selectionOverlay { position:absolute; top:0; bottom:0; background:rgba(244,208,63,0.18);
    border-left:1px solid rgba(244,208,63,0.7); border-right:1px solid rgba(244,208,63,0.7);
    pointer-events:none; z-index:3; display:none; }
  #selectionRulerMark { position:absolute; top:0; bottom:0; background:rgba(244,208,63,0.3); pointer-events:none; z-index:4; display:none; }
  #timeSelectionBtn.active { border-color:var(--amber) !important; background:var(--amber) !important; color:#1c1a17 !important; }
  .track-lane { position:relative; height:var(--row-h); border-bottom:1px solid var(--border); box-sizing:border-box; cursor:pointer; }
  .track-lane:last-child { border-bottom:none; }
  .empty-hint { font-size:11px; color:#514c40; position:absolute; left:8px; top:50%; transform:translateY(-50%); }
  .clip-block { position:absolute; top:8px; height:calc(var(--row-h) - 16px); border-radius:6px; background:var(--teal);
    border:1px solid #3d5b58; color:var(--teal-light); display:flex; align-items:center; gap:4px;
    padding:0 6px; cursor:grab; font-size:10px; white-space:nowrap; touch-action:none; }
  .clip-block.dragging { opacity:.85; z-index:5; box-shadow:0 2px 8px rgba(0,0,0,.5); }
  .clip-block.fade-active { border:2px solid #f4d03f; box-shadow:0 0 0 2px rgba(244,208,63,0.35); z-index:4; }
  .trim-handle { position:absolute; top:0; bottom:0; width:24px; cursor:ew-resize;
    background:rgba(244,208,63,0.55); touch-action:none; z-index:6; }
  .trim-handle.left { left:0; border-radius:6px 0 0 6px; }
  .trim-handle.right { right:0; border-radius:0 6px 6px 0; }
  .fade-handle { position:absolute; top:0; width:22px; height:22px; cursor:ew-resize; touch-action:none; z-index:6; }
  .fade-handle.left { left:0; background:linear-gradient(135deg, rgba(205,232,224,0.9) 50%, transparent 50%); }
  .fade-handle.right { right:0; background:linear-gradient(225deg, rgba(205,232,224,0.9) 50%, transparent 50%); }
  .live-block { position:absolute; top:8px; height:calc(var(--row-h) - 16px); border-radius:6px; background:var(--red-dim); border:1px solid var(--red); }
  .playhead { position:absolute; top:0; bottom:0; width:14px; margin-left:-7px; z-index:6; pointer-events:none; }
  .playhead .line { position:absolute; left:6px; top:0; bottom:0; width:2px; background:var(--amber); }
  .playhead .handle { position:absolute; left:1px; top:-2px; width:12px; height:8px; background:var(--amber); border-radius:2px; }
  .asset-row, .picker-row { display:flex; align-items:center; gap:8px; padding:6px 4px; font-size:12px; border-bottom:1px solid var(--border); }
  .asset-row:last-child, .picker-row:last-child { border-bottom:none; }
  .asset-row .aname, .picker-row .aname { flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .asset-row .asize, .picker-row .asize { font-size:10px; color:var(--dim); flex-shrink:0; }
  .asset-row.unused .aname { color:#8a7a5a; }
  .asset-row.unused .asize { color:#7a6a4a; }
  .picker-row button { font-size:10px; padding:3px 8px; border-radius:5px; border:1px solid var(--border); background:var(--teal); color:var(--teal-light); cursor:pointer; flex-shrink:0; }
</style>
</head>
<body>
<div class="wrap">
  <div class="sticky-header-block">
    <div class="notice" id="notice"></div>

    <div class="transport" style="flex-wrap:wrap;">
      <div class="tape-title-block"><div class="tape-title">Tape</div><div class="tape-version" id="versionTag">v10.1</div></div>
      <button id="toStartBtn" class="tbtn" style="font-size:16px;background:var(--panel);border:1px solid var(--border);color:var(--text);" aria-label="Back to start">|◀</button>
      <button id="skipBackBtn" class="tbtn" style="font-size:12px;background:var(--panel);border:1px solid var(--border);color:var(--text);" aria-label="Back 10 seconds">-10s</button>
      <button id="recordBtn" class="tbtn" aria-label="Record">●</button>
      <button id="playBtn" class="tbtn" aria-label="Play">▶</button>
      <button id="skipFwdBtn" class="tbtn" style="font-size:12px;background:var(--panel);border:1px solid var(--border);color:var(--text);" aria-label="Forward 10 seconds">+10s</button>
      <button id="undoBtn" class="tbtn" style="background:var(--panel);border:1px solid var(--border);color:var(--text);" aria-label="Undo" disabled><svg width="26" height="26" viewBox="0 0 24 24" fill="currentColor"><path d="M12.5 8c-2.65 0-5.05.99-6.9 2.6L2 7v9h9l-3.62-3.62c1.39-1.16 3.16-1.88 5.12-1.88 3.54 0 6.55 2.31 7.6 5.5l2.37-.78C21.08 11.03 17.15 8 12.5 8z"/></svg></button>
      <button id="redoBtn" class="tbtn" style="background:var(--panel);border:1px solid var(--border);color:var(--text);" aria-label="Redo" disabled><svg width="26" height="26" viewBox="0 0 24 24" fill="currentColor"><path d="M18.4 10.6C16.55 8.99 14.15 8 11.5 8c-4.65 0-8.58 3.03-9.96 7.22L3.9 16c1.05-3.19 4.05-5.5 7.6-5.5 1.95 0 3.73.72 5.12 1.88L13 16h9V7l-3.6 3.6z"/></svg></button>
      <div id="timer" class="timer-inline">00:00.0</div>
      <div class="meter-vertical"><div id="meterFill"></div></div>
      <div id="gainKnob" class="gain-knob" aria-label="Input gain"><div id="gainKnobIndicator" class="gain-knob-indicator"></div></div>
      <div id="savedTag">saved</div>
    </div>

    <div class="section-row">
      <button id="projectMenuBtn" style="font-size:14px; padding:8px 16px; border-radius:8px; border:1px solid var(--border); background:var(--panel); color:var(--amber);">Project ▾</button>
      <div style="display:flex; align-items:center; gap:8px; flex-wrap:wrap;">
        <button id="followBtn" style="font-size:13px; padding:8px 14px; border-radius:8px; border:1px solid var(--amber); background:var(--amber); color:#1c1a17; text-transform:uppercase; letter-spacing:.03em;">Follow</button>
        <button id="timeSelectionBtn" style="font-size:12px; padding:8px 14px; border-radius:8px; border:1px solid var(--border); background:var(--panel); color:var(--text); text-transform:uppercase; letter-spacing:.03em;">Time Selection</button>
        <div class="v-divider"></div>
        <button id="zoomOutBtn" style="padding:8px 14px; border-radius:8px; border:1px solid var(--border); background:var(--panel); color:var(--text); display:flex; align-items:center;"><svg width="14" height="14" viewBox="0 0 24 24"><circle cx="10" cy="10" r="7" stroke="currentColor" stroke-width="2.5" fill="none"/><line x1="15" y1="15" x2="21" y2="21" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/></svg></button>
        <button id="zoomInBtn" style="padding:6px 12px; border-radius:8px; border:1px solid var(--border); background:var(--panel); color:var(--text); display:flex; align-items:center;"><svg width="24" height="24" viewBox="0 0 24 24"><circle cx="10" cy="10" r="7" stroke="currentColor" stroke-width="2.5" fill="none"/><line x1="15" y1="15" x2="21" y2="21" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/></svg></button>
        <div class="v-divider"></div>
        <button id="addTrackBtn" style="font-size:14px; padding:8px 14px;">+ Add track</button>
      </div>
      <input type="file" id="importFileInput" accept="application/json,.json" style="display:none;">
    </div>

    <div class="mixer-ruler-row">
      <div class="headers-col-spacer"></div>
      <div id="rulerOuter"><div id="ruler"></div></div>
    </div>
  </div>

  <div class="mixer">
    <div class="headers-col">
      <div id="headersList"></div>
    </div>
    <div id="timelineOuter">
      <div id="timelineInner">
        <div id="selectionOverlay"></div>
        <div id="lanesContainer"></div>
        <div class="playhead" id="playheadEl"><div class="line"></div><div class="handle"></div></div>
      </div>
    </div>
  </div>

  <div style="margin-top:20px;">
    <button id="browseFilesBtn" style="font-size:11px; padding:5px 10px; border-radius:6px; border:1px solid var(--border); background:var(--panel); color:var(--amber);">Browse sound files to add</button>
    <div id="pickerWrap" style="display:none; margin-top:8px;">
      <input type="text" id="fileFilterInput" placeholder="filter selected files…" style="width:100%; background:var(--panel); color:var(--text); border:1px solid var(--border); border-radius:6px; font-size:12px; padding:6px 8px; margin-bottom:6px;">
      <div id="pickerResults" style="background:var(--panel); border:1px solid var(--border); border-radius:10px; max-height:220px; overflow-y:auto; padding:6px;"></div>
    </div>
    <input type="file" id="deviceFileInput" accept="audio/*" multiple style="display:none;">

    <div class="section-row" style="margin-top:16px;">
      <span class="section-label">Project files</span>
      <button id="purgeAssetsBtn" style="font-size:10px; padding:3px 8px; border-radius:6px; border:1px solid var(--red); background:transparent; color:var(--red);">Purge unused</button>
    </div>
    <div id="assetList" style="background:var(--panel); border:1px solid var(--border); border-radius:10px; max-height:220px; overflow-y:auto; padding:6px;"></div>
  </div>
</div>

<script>
let PPS = 40;
const MIN_CLIP_DUR = 0.04;
const ROW_H_JS = 64;

let audioCtx = null;
let stream = null, mediaRecorder = null, chunks = [];
let analyser = null, meterRafId = null;
let isRecording = false, recordStartTime = 0, elapsed = 0, elapsedInterval = null;
let takeStartPos = 0;

let tracks = []; // {id, name, volume, muted, soloed, armed, gainNode, clips:[{id,start,duration,buffer,blob}]}
let playheadPos = 0;
let playing = false, activeSources = [], playRAF = null, playStartCtxTime = 0, playStartPlayhead = 0;
let dragState = null;
let activeEditClipId = null; // clip currently showing draggable handles
let activeEditType = null; // 'trim' | 'fade'
let clipPress = null; // long-press/tap tracking on a clip body
let emptyPress = null; // long-press/tap tracking on empty lane space
let trimDragState = null;
let fadeDragState = null;
let clipboard = null; // {assetId, trimIn, trimOut, duration}
let contextMenuEl = null, contextMenuOverlay = null;
const LONG_PRESS_MS = 550;
const MOVE_THRESHOLD = 6;
let undoStack = [];
let redoStack = [];
function cloneTracksClips() {
  return tracks.map(t => ({ id:t.id, name:t.name, volume:t.volume, muted:t.muted, soloed:t.soloed, armed:t.armed,
    gainNode:t.gainNode, clips: t.clips.map(c => ({...c})) }));
}
function pushUndoSnapshot() {
  undoStack.push(cloneTracksClips());
  if (undoStack.length > 50) undoStack.shift();
  redoStack = [];
  updateUndoRedoButtons();
}
function applySnapshot(snap) {
  const snapIds = new Set(snap.map(s=>s.id));
  const currentById = new Map(tracks.map(t=>[t.id,t]));
  tracks.forEach(t => { if (!snapIds.has(t.id)) { try { t.gainNode.disconnect(); } catch(e){} } });
  snap.forEach(s => { if (!currentById.has(s.id)) { try { s.gainNode.connect(audioCtx.destination); } catch(e){} } });
  tracks = snap.map(s => {
    const existing = currentById.get(s.id);
    return {
      id:s.id, name:s.name,
      volume: existing ? existing.volume : s.volume,
      muted: existing ? existing.muted : s.muted,
      soloed: existing ? existing.soloed : s.soloed,
      armed: s.armed, gainNode:s.gainNode, clips: s.clips.map(c => ({...c}))
    };
  });
  applyTrackGains();
  if (activeEditClipId && !tracks.some(t => t.clips.some(c => c.id === activeEditClipId))) { activeEditClipId = null; activeEditType = null; }
}
function undo() {
  if (!undoStack.length) return;
  redoStack.push(cloneTracksClips());
  const snap = undoStack.pop();
  applySnapshot(snap);
  updateUndoRedoButtons();
  saveProject();
  renderAll();
}
function redo() {
  if (!redoStack.length) return;
  undoStack.push(cloneTracksClips());
  const snap = redoStack.pop();
  applySnapshot(snap);
  updateUndoRedoButtons();
  saveProject();
  renderAll();
}
function updateUndoRedoButtons() {
  if (undoBtn) undoBtn.disabled = undoStack.length === 0;
  if (redoBtn) redoBtn.disabled = redoStack.length === 0;
}
let scrubbing = false;

const recordBtn = document.getElementById('recordBtn');
const playBtn = document.getElementById('playBtn');
const undoBtn = document.getElementById('undoBtn');
const redoBtn = document.getElementById('redoBtn');
const toStartBtn = document.getElementById('toStartBtn');
const skipBackBtn = document.getElementById('skipBackBtn');
const skipFwdBtn = document.getElementById('skipFwdBtn');
function seekTo(pos) {
  playheadPos = Math.max(0, pos);
  renderLanes();
  if (playing) play();
}
toStartBtn.addEventListener('click', () => seekTo(0));
skipBackBtn.addEventListener('click', () => seekTo(playheadPos - 10));
skipFwdBtn.addEventListener('click', () => seekTo(playheadPos + 10));
undoBtn.addEventListener('click', undo);
redoBtn.addEventListener('click', redo);
const timerEl = document.getElementById('timer');
const meterFill = document.getElementById('meterFill');
const savedTag = document.getElementById('savedTag');
const gainKnob = document.getElementById('gainKnob');
const gainKnobIndicator = document.getElementById('gainKnobIndicator');
const GAIN_MIN = 1, GAIN_MAX = 6;
function updateGainKnobVisual() {
  const pct = (inputGainValue - GAIN_MIN) / (GAIN_MAX - GAIN_MIN);
  const angle = -135 + pct*270;
  gainKnobIndicator.style.transform = 'rotate(' + angle + 'deg)';
}
let gainKnobDrag = null;
gainKnob.addEventListener('pointerdown', (e) => {
  gainKnobDrag = { startY: e.clientY, startVal: inputGainValue };
  e.preventDefault();
});
window.addEventListener('pointermove', (e) => {
  if (!gainKnobDrag) return;
  const dy = gainKnobDrag.startY - e.clientY;
  const delta = (dy/120) * (GAIN_MAX-GAIN_MIN);
  inputGainValue = Math.max(GAIN_MIN, Math.min(GAIN_MAX, gainKnobDrag.startVal + delta));
  if (activeBoostGain) activeBoostGain.gain.value = inputGainValue;
  updateGainKnobVisual();
});
window.addEventListener('pointerup', () => { gainKnobDrag = null; });
const notice = document.getElementById('notice');
const addTrackBtn = document.getElementById('addTrackBtn');
const followBtn = document.getElementById('followBtn');
let followPlayhead = true;
let timeSelectionMode = false;
let timeSelection = null; // {start, end} in seconds
let selStartDrag = null;
function updateFollowBtn() {
  followBtn.style.background = followPlayhead ? 'var(--amber)' : 'var(--panel)';
  followBtn.style.color = followPlayhead ? '#1c1a17' : 'var(--text)';
  followBtn.style.borderColor = followPlayhead ? 'var(--amber)' : 'var(--border)';
}
followBtn.addEventListener('click', () => { followPlayhead = !followPlayhead; updateFollowBtn(); });
const timeSelectionBtn = document.getElementById('timeSelectionBtn');
timeSelectionBtn.addEventListener('click', () => {
  timeSelectionMode = !timeSelectionMode;
  timeSelectionBtn.classList.toggle('active', timeSelectionMode);
  timelineOuter.style.touchAction = timeSelectionMode ? 'none' : 'pan-x pan-y';
  if (!timeSelectionMode) { timeSelection = null; renderTimeSelectionOverlay(); }
});
const zoomInBtn = document.getElementById('zoomInBtn');
const zoomOutBtn = document.getElementById('zoomOutBtn');
function relayoutClipsForZoom() {
  renderRuler();
  tracks.forEach(t => {
    t.clips.forEach(c => {
      const el = clipBlockEls.get(c.id);
      if (el) {
        el.style.left = (c.start*PPS)+'px';
        el.style.width = Math.max(c.duration*PPS, 28)+'px';
      }
    });
  });
  if (liveBlockEl) liveBlockEl.style.left = (takeStartPos*PPS)+'px';
  renderPlayheadPosition();
}
function setZoom(newPPS) {
  newPPS = Math.max(10, Math.min(200, newPPS));
  if (newPPS === PPS) return;
  const playheadScreenX = playheadPos*PPS - timelineOuter.scrollLeft;
  PPS = newPPS;
  relayoutClipsForZoom();
  timelineOuter.scrollLeft = Math.max(0, playheadPos*PPS - playheadScreenX);
}
zoomInBtn.addEventListener('click', () => setZoom(PPS * 1.4));
zoomOutBtn.addEventListener('click', () => setZoom(PPS / 1.4));


const assetList = document.getElementById('assetList');
const purgeAssetsBtn = document.getElementById('purgeAssetsBtn');
function usedAssetIdSet() {
  const s = new Set();
  tracks.forEach(t => t.clips.forEach(c => s.add(c.assetId)));
  return s;
}
function renderAssetList() {
  if (!assetList) return;
  const used = usedAssetIdSet();
  assetList.innerHTML = '';
  if (projectAssets.length === 0) {
    assetList.innerHTML = '<div style="font-size:11px; color:#514c40; padding:6px;">No recordings yet.</div>';
    return;
  }
  projectAssets.forEach(a => {
    const isUsed = used.has(a.id);
    const row = document.createElement('div');
    row.className = 'asset-row' + (isUsed ? '' : ' unused');
    const name = document.createElement('span');
    name.className = 'aname';

async function importProjectFile(file) {

          trimIn = typeof sc.trimIn === 'number' ? sc.trimIn : 0;

function addTrack(name) {
  const ctx = ensureAudioCtx();
  pushUndoSnapshot();
  const gainNode = ctx.createGain();
  gainNode.connect(ctx.destination);
  const track = { id: genId(), name: name || ('Track ' + (tracks.length+1)), volume:1, muted:false, soloed:false, armed:false, gainNode, clips:[] };
  tracks.push(track);
  if (!tracks.some(t=>t.armed)) track.armed = true;
  applyTrackGains();

}
function armedTrack() { return tracks.find(t=>t.armed) || null; }
function setArmed(id) { tracks.forEach(t => t.armed = (t.id===id)); renderAll(); }
function toggleMute(id) { const t = tracks.find(t=>t.id===id); t.muted = !t.muted; applyTrackGains(); renderAll(); saveProject(); }
function toggleSolo(id) { const t = tracks.find(t=>t.id===id); t.soloed = !t.soloed; applyTrackGains(); renderAll(); saveProject(); }
function setVolume(id, val) { const t = tracks.find(t=>t.id===id); t.volume = val; applyTrackGains(); saveProject(); }
function applyTrackGains() {
  const anySolo = tracks.some(t=>t.soloed);
  tracks.forEach(t => {
    let audible;
    if (anySolo) audible = t.soloed;
    else audible = !t.muted;
    const target = audible ? t.volume : 0;
    if (t.gainNode) t.gainNode.gain.value = target;
  });
}
function deleteTrack(id) {
  const t = tracks.find(t=>t.id===id);
  if (!t) return;
  pushUndoSnapshot();
  try { t.gainNode.disconnect(); } catch(e){}
  tracks = tracks.filter(tr => tr.id !== id);
  if (!tracks.some(tr=>tr.armed) && tracks.length) tracks[0].armed = true;
  renderAll();
  saveProject();
}

/* ---------- WAV encode / buffer slicing ---------- */
function audioBufferToWavBlob(buffer) {
  const numCh = buffer.numberOfChannels, sr = buffer.sampleRate, len = buffer.length;
  const blockAlign = numCh*2, dataSize = len*blockAlign;
  const bufOut = new ArrayBuffer(44+dataSize);
  const view = new DataView(bufOut);
  function writeStr(off,str){ for(let i=0;i<str.length;i++) view.setUint8(off+i, str.charCodeAt(i)); }
  writeStr(0,'RIFF'); view.setUint32(4,36+dataSize,true); writeStr(8,'WAVE');
  writeStr(12,'fmt '); view.setUint32(16,16,true); view.setUint16(20,1,true);
  view.setUint16(22,numCh,true); view.setUint32(24,sr,true);
  view.setUint32(28,sr*blockAlign,true); view.setUint16(32,blockAlign,true); view.setUint16(34,16,true);
  writeStr(36,'data'); view.setUint32(40,dataSize,true);
  const channels=[]; for(let ch=0;ch<numCh;ch++) channels.push(buffer.getChannelData(ch));
  let offset=44;
  for (let i=0;i<len;i++) for (let ch=0;ch<numCh;ch++) {
    let s = Math.max(-1, Math.min(1, channels[ch][i]));
    s = s<0 ? s*0x8000 : s*0x7FFF;
    view.setInt16(offset, s, true); offset+=2;
  }
  return new Blob([bufOut], { type:'audio/wav' });
}
function makeWaveformUrl(buffer, widthPx, heightPx) {
  widthPx = Math.max(4, Math.round(widthPx));
  heightPx = Math.max(4, Math.round(heightPx));
  const scale = 2;
  const canvas = document.createElement('canvas');
  canvas.width = widthPx * scale;
  canvas.height = heightPx * scale;
  const g = canvas.getContext('2d');
  const numCh = buffer.numberOfChannels;
  const chData = [];
  for (let ch=0; ch<numCh; ch++) chData.push(buffer.getChannelData(ch));
  const totalSamples = buffer.length;
  const midY = (heightPx*scale)/2;
  g.strokeStyle = 'rgba(205,232,224,0.85)';
  g.lineWidth = 1 * scale;
  g.beginPath();
  for (let x=0; x<widthPx*scale; x++) {
    const sStart = Math.floor((x/(widthPx*scale)) * totalSamples);
    const sEnd = Math.max(sStart+1, Math.floor(((x+1)/(widthPx*scale)) * totalSamples));
    let min=1, max=-1;
    for (let s=sStart; s<sEnd; s++) {
      for (let ch=0; ch<numCh; ch++) {
        const v = chData[ch][s];
        if (v < min) min = v;
        if (v > max) max = v;
      }
    }
    if (max < min) { max = 0; min = 0; }
    const y1 = midY - max*midY, y2 = midY - min*midY;
    g.moveTo(x, y1); g.lineTo(x, y2);
  }
  g.stroke();
  return canvas.toDataURL();
}
function sliceAudioBuffer(buffer, startSec, endSec) {
  const sr = buffer.sampleRate;
  const startSample = Math.max(0, Math.floor(startSec*sr));
  const endSample = Math.min(buffer.length, Math.floor(endSec*sr));
  const length = Math.max(1, endSample-startSample);
  const ctx = ensureAudioCtx();
  const out = ctx.createBuffer(buffer.numberOfChannels, length, sr);
  for (let ch=0; ch<buffer.numberOfChannels; ch++) out.copyToChannel(buffer.getChannelData(ch).slice(startSample,endSample), ch, 0);
  return out;
}
function makeTrimmedClip(original, sliceStartSec, sliceEndSec, newAbsStart) {
  const dur = sliceEndSec - sliceStartSec;
  if (dur < MIN_CLIP_DUR) return null;
  const asset = getAsset(original.assetId);
  if (!asset) return null;
  const newTrimIn = original.trimIn + sliceStartSec;
  const newTrimOut = original.trimIn + sliceEndSec;
  const visible = sliceAudioBuffer(asset.buffer, newTrimIn, newTrimOut);
  return { id: genId(), assetId: original.assetId, start:newAbsStart, duration:dur, trimIn:newTrimIn, trimOut:newTrimOut,
    fadeIn:0, fadeOut:0,
    waveformUrl: makeWaveformUrl(visible, Math.max(dur*PPS, 28), ROW_H_JS-16) };
}
function resolveOverlaps(trackClips, newStart, newEnd, excludeId) {
  const toRemove=[], toAdd=[];
  for (const c of trackClips) {
    if (c.id === excludeId) continue;
    const cStart=c.start, cEnd=c.start+c.duration;
    if (cEnd<=newStart || cStart>=newEnd) continue;
    toRemove.push(c.id);
    if (cStart>=newStart && cEnd<=newEnd) continue;
    else if (cStart<newStart && cEnd>newEnd) {
      const left = makeTrimmedClip(c,0,newStart-cStart,cStart);
      const right = makeTrimmedClip(c,newEnd-cStart,c.duration,newEnd);
      if (left) toAdd.push(left); if (right) toAdd.push(right);
    } else if (cStart<newStart) {
      const left = makeTrimmedClip(c,0,newStart-cStart,cStart);
      if (left) toAdd.push(left);
    } else {
      const right = makeTrimmedClip(c,newEnd-cStart,c.duration,newEnd);
      if (right) toAdd.push(right);
    }
  }
  return { toRemove, toAdd };
}

/* ---------- Recording ---------- */
let micStream = null;
let inputGainValue = 6;
let activeBoostGain = null;
let micGraphReady = false;
let meterRunning = false;
function tickLevel() {
  if (!analyser || !meterRunning) return;
  const data = new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteTimeDomainData(data);
  let sum=0; for (let i=0;i<data.length;i++){ const v=(data[i]-128)/128; sum+=v*v; }
  meterFill.style.height = Math.min(1, Math.sqrt(sum/data.length)*4)*100+'%';
  meterRafId = requestAnimationFrame(tickLevel);
}
function resetRecordingUI() {
  isRecording = false;
  recordBtn.classList.remove('recording'); recordBtn.textContent = '●';
  playBtn.disabled = false;
  clearInterval(elapsedInterval);
  timerEl.textContent = '00:00.0'; elapsed = 0;
}
async function ensureMicGraph() {
  if (micGraphReady && micStream && micStream.getTracks().some(t => t.readyState === 'live')) return;
  micStream = await navigator.mediaDevices.getUserMedia({
    audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false }
  });
  stream = micStream;
  const ctx = ensureAudioCtx();
  if (ctx.state==='suspended') await ctx.resume();
  const source = ctx.createMediaStreamSource(micStream);
  activeBoostGain = ctx.createGain();
  activeBoostGain.gain.value = inputGainValue;
  source.connect(activeBoostGain);
  analyser = ctx.createAnalyser(); analyser.fftSize = 512;
  activeBoostGain.connect(analyser);
  micGraphReady = true;
  if (!meterRunning) { meterRunning = true; tickLevel(); }
}
let recordingStarting = false;
async function startRecording() {
  if (isRecording || recordingStarting) return;
  const target = armedTrack();
  if (!target) { showNotice('Add and arm a track before recording.'); return; }
  recordingStarting = true;
  recordBtn.disabled = true;
  try { await ensureMicGraph(); }
  catch (err) {
    showNotice("Microphone access was blocked or failed. Check the site's permission settings and that this page is loaded over HTTPS.");
    recordingStarting = false; recordBtn.disabled = false;
    return;
  }
  const ctx = ensureAudioCtx();
  const destNode = ctx.createMediaStreamDestination();
  activeBoostGain.connect(destNode);

  let mimeType='';
  if (MediaRecorder.isTypeSupported('audio/mp4')) mimeType='audio/mp4';
  else if (MediaRecorder.isTypeSupported('audio/webm')) mimeType='audio/webm';
  const localRecorder = mimeType ? new MediaRecorder(destNode.stream,{mimeType}) : new MediaRecorder(destNode.stream);
  const localChunks = [];
  mediaRecorder = localRecorder;
  takeStartPos = playheadPos;
  let handledStop = false;

  localRecorder.ondataavailable = e => { if (e.data.size>0) localChunks.push(e.data); };
  localRecorder.onstop = async () => {
    if (handledStop) return;
    handledStop = true;
    if (isRecording) resetRecordingUI();
    try { activeBoostGain.disconnect(destNode); } catch(e){}
    const rawBlob = new Blob(localChunks, { type: localRecorder.mimeType || 'audio/webm' });
    try {
      const arrBuf = await rawBlob.arrayBuffer();
      const decoded = await ctx.decodeAudioData(arrBuf);
      const newStart = takeStartPos, newEnd = newStart+decoded.duration;
      const trk = tracks.find(t=>t.id===target.id);
      if (!trk) return;
      pushUndoSnapshot();
      const { toRemove, toAdd } = resolveOverlaps(trk.clips, newStart, newEnd, null);
      trk.clips = trk.clips.filter(c => !toRemove.includes(c.id));
      trk.clips.push(...toAdd);
      const assetId = genId();
      projectAssets.push({ id: assetId, name: 'Recording ' + (projectAssets.length+1), blob: rawBlob, buffer: decoded, mimeType: rawBlob.type, size: rawBlob.size });
      trk.clips.push({ id:genId(), assetId, start:newStart, duration:decoded.duration,
        trimIn:0, trimOut:decoded.duration, fadeIn:0, fadeOut:0,
        waveformUrl: makeWaveformUrl(decoded, Math.max(decoded.duration*PPS, 28), ROW_H_JS-16) });
      playheadPos = newEnd;
      saveProject();
      renderAll();
      renderAssetList();
    } catch (e) { showNotice('Could not process the recording: '+e.message); }
  };
  localRecorder.onerror = () => { if (!handledStop) { handledStop = true; resetRecordingUI(); showNotice('Recording stopped unexpectedly. Please try again.'); } };
  recordStartTime = Date.now();
  localRecorder.start();
  isRecording = true;
  recordingStarting = false;
  recordBtn.disabled = false;
  recordBtn.classList.add('recording'); recordBtn.textContent='■';
  playBtn.disabled = true;
  renderLanes();
  elapsedInterval = setInterval(() => {
    elapsed = (Date.now()-recordStartTime)/1000;
    timerEl.textContent = fmt(elapsed);
    const neededTicks = Math.ceil(totalDurationNow());
    if (neededTicks > lastRenderedTickCount || !liveBlockEl) {
      renderLanes();
    } else {
      liveBlockEl.style.width = Math.max(elapsed*PPS, 4)+'px';
    }
  }, 50);
}
function stopRecording() {
  if (!isRecording) return;
  if (mediaRecorder && mediaRecorder.state!=='inactive') mediaRecorder.stop();
  else resetRecordingUI();
}
recordBtn.addEventListener('click', () => { if (isRecording) stopRecording(); else startRecording(); });

/* ---------- Playback ---------- */
function stopSources() { activeSources.forEach(s=>{ try{s.stop();}catch(e){} }); activeSources=[]; }
function play() {
  const ctx = ensureAudioCtx();
  if (ctx.state==='suspended') ctx.resume();
  stopSources();
  playStartPlayhead = playheadPos;
  playStartCtxTime = ctx.currentTime + 0.05;
  applyTrackGains();
  for (const t of tracks) {
    for (const c of t.clips) {
      const clipEnd = c.start+c.duration;
      if (clipEnd <= playheadPos) continue;
      const asset = getAsset(c.assetId);
      if (!asset) continue;
      const src = ctx.createBufferSource();
      src.buffer = asset.buffer;
      const fadeIn = c.fadeIn||0, fadeOut = c.fadeOut||0;
      if (fadeIn > 0 || fadeOut > 0) {
        const fadeGain = ctx.createGain();
        src.connect(fadeGain);
        fadeGain.connect(t.gainNode);
        src.onended = () => { try{fadeGain.disconnect();}catch(e){} try{src.disconnect();}catch(e){} };
        const clipStartCtx = c.start >= playheadPos ? playStartCtxTime + (c.start - playheadPos) : playStartCtxTime;
        const clipEndCtx = playStartCtxTime + (c.start + c.duration - playheadPos);
        if (fadeIn > 0 && c.start >= playheadPos) {
          fadeGain.gain.setValueAtTime(0, clipStartCtx);
          fadeGain.gain.linearRampToValueAtTime(1, clipStartCtx + fadeIn);
        } else {
          fadeGain.gain.setValueAtTime(1, playStartCtxTime);
        }
        if (fadeOut > 0) {
          const fadeOutStart = Math.max(clipEndCtx - fadeOut, playStartCtxTime);
          fadeGain.gain.setValueAtTime(1, fadeOutStart);
          fadeGain.gain.linearRampToValueAtTime(0, clipEndCtx);
        }
      } else {
        src.connect(t.gainNode);
      }
      if (c.start >= playheadPos) src.start(playStartCtxTime + (c.start-playheadPos), c.trimIn, c.duration);
      else {
        const into = playheadPos - c.start;
        src.start(playStartCtxTime, c.trimIn+into, c.duration-into);
      }
      activeSources.push(src);
    }
  }
  playing = true;
  playBtn.textContent = '■';
  recordBtn.disabled = true;
  updatePlaybackFrame();
}
function updatePlaybackFrame() {
  const ctx = audioCtx;
  const elapsedSincePlay = ctx.currentTime - playStartCtxTime;
  if (elapsedSincePlay >= 0) playheadPos = playStartPlayhead + elapsedSincePlay;
  const totalEnd = tracks.reduce((m,t)=>Math.max(m, ...t.clips.map(c=>c.start+c.duration), m), 0);
  renderPlayheadPosition();
  if (followPlayhead) {
    const target = Math.max(0, playheadPos*PPS - timelineOuter.clientWidth/2);
    timelineOuter.scrollLeft = target;
  }
  if (playing && totalEnd>0 && playheadPos>=totalEnd) { stopPlayback(totalEnd); return; }
  if (playing) playRAF = requestAnimationFrame(updatePlaybackFrame);
}
function stopPlayback(fixedPos) {
  playing=false; stopSources(); cancelAnimationFrame(playRAF);
  if (typeof fixedPos==='number') playheadPos = fixedPos;
  playBtn.textContent='▶'; recordBtn.disabled=false;
  renderPlayheadPosition();
}
playBtn.addEventListener('click', () => { if (playing) stopPlayback(); else play(); });

/* ---------- Clip delete ---------- */
function deleteClip(trackId, clipId) {
  pushUndoSnapshot();
  const t = tracks.find(t=>t.id===trackId);
  t.clips = t.clips.filter(c=>c.id!==clipId);
  if (activeEditClipId === clipId) { activeEditClipId = null; activeEditType = null; }
  saveProject();
  renderAll();
}

function closeContextMenu() {

    { label:'Cut', action: () => { clipboard = { assetId:clip.assetId, trimIn:clip.trimIn, trimOut:clip.trimOut, duration:clip.duration }; deleteClip(trackId, clipId); } },
    { label:'Copy', action: () => { clipboard = { assetId:clip.assetId, trimIn:clip.trimIn, trimOut:clip.trimOut, duration:clip.duration }; } },
    { label:'Split at playhead', action: () => splitClipAtPlayhead(trackId, clipId) },
    { label:'Trim', action: () => { activeEditClipId = clip.id; activeEditType = 'trim'; renderLanes(); } },
    { label:'Fade', action: () => { activeEditClipId = clip.id; activeEditType = 'fade'; renderLanes(); } },

}
function showPasteMenu(trackId, posSec, x, y) {

}

/* ---------- Split / Paste ---------- */
function splitClipAtPlayhead(trackId, clipId) {
  const t = tracks.find(t=>t.id===trackId);
  const clip = t && t.clips.find(c=>c.id===clipId);
  if (!clip) return;
  const splitPoint = playheadPos;
  if (splitPoint <= clip.start + MIN_CLIP_DUR || splitPoint >= clip.start + clip.duration - MIN_CLIP_DUR) {
    showNotice('Move the playhead inside the clip to split it.');
    return;
  }
  const asset = getAsset(clip.assetId);
  if (!asset) return;
  pushUndoSnapshot();
  const offsetIntoClip = splitPoint - clip.start;
  const leftDur = offsetIntoClip, rightDur = clip.duration - offsetIntoClip;
  const leftTrimOut = clip.trimIn + leftDur;
  const leftVisible = sliceAudioBuffer(asset.buffer, clip.trimIn, leftTrimOut);
  const rightVisible = sliceAudioBuffer(asset.buffer, leftTrimOut, clip.trimOut);
  const left = { id:genId(), assetId:clip.assetId, start:clip.start, duration:leftDur, trimIn:clip.trimIn, trimOut:leftTrimOut,
    fadeIn: clip.fadeIn||0, fadeOut:0, waveformUrl: makeWaveformUrl(leftVisible, Math.max(leftDur*PPS,28), ROW_H_JS-16) };
  const right = { id:genId(), assetId:clip.assetId, start:splitPoint, duration:rightDur, trimIn:leftTrimOut, trimOut:clip.trimOut,
    fadeIn:0, fadeOut: clip.fadeOut||0, waveformUrl: makeWaveformUrl(rightVisible, Math.max(rightDur*PPS,28), ROW_H_JS-16) };
  t.clips = t.clips.filter(c=>c.id!==clipId).concat([left, right]);
  if (activeEditClipId === clipId) { activeEditClipId = null; activeEditType = null; }
  saveProject();
  renderAll();
}
function pasteAtPosition(trackId, posSec) {
  if (!clipboard) return;
  const t = tracks.find(t=>t.id===trackId);
  if (!t) return;
  const asset = getAsset(clipboard.assetId);
  if (!asset) { showNotice('That recording is no longer in this project.'); return; }
  pushUndoSnapshot();
  const newStart = Math.max(0, posSec), newEnd = newStart + clipboard.duration;
  const { toRemove, toAdd } = resolveOverlaps(t.clips, newStart, newEnd, null);
  t.clips = t.clips.filter(c => !toRemove.includes(c.id));
  t.clips.push(...toAdd);
  const visible = sliceAudioBuffer(asset.buffer, clipboard.trimIn, clipboard.trimOut);
  t.clips.push({ id:genId(), assetId:clipboard.assetId, start:newStart, duration:clipboard.duration,
    trimIn:clipboard.trimIn, trimOut:clipboard.trimOut, fadeIn:0, fadeOut:0,
    waveformUrl: makeWaveformUrl(visible, Math.max(clipboard.duration*PPS,28), ROW_H_JS-16) });
  saveProject();
  renderAll();
}

/* ---------- Playhead & clip dragging ---------- */
function xToSec(clientX) {
  const rect = timelineInner.getBoundingClientRect();
  return Math.max(0, (clientX-rect.left)/PPS);
}
let scrubWasPlaying = false;
function onScrubStart(e) {
  scrubbing=true;
  scrubWasPlaying = playing;
  if (playing) { stopSources(); cancelAnimationFrame(playRAF); }
  playheadPos = xToSec(e.clientX);
  renderPlayheadPosition();
  e.preventDefault();
}
function onScrubMove(e) { if (!scrubbing) return; playheadPos = xToSec(e.clientX); renderPlayheadPosition(); }
function onScrubEnd() {
  if (!scrubbing) return;
  scrubbing=false;
  if (scrubWasPlaying) play();
}
function exitEditMode() {
  if (activeEditClipId) { activeEditClipId = null; activeEditType = null; renderLanes(); }
}
function onSelectionPointerDown(e) {
  if (e.preventDefault) e.preventDefault();
  closeContextMenu();
  const sec = xToSec(e.clientX);
  selStartDrag = { startX:e.clientX, startSec:sec, moved:false };
}
window.addEventListener('pointermove', (e) => {
  if (!selStartDrag) return;
  const dx = e.clientX - selStartDrag.startX;
  if (Math.abs(dx) > MOVE_THRESHOLD) selStartDrag.moved = true;
  if (selStartDrag.moved) {
    const curSec = xToSec(e.clientX);
    timeSelection = { start: Math.min(selStartDrag.startSec, curSec), end: Math.max(selStartDrag.startSec, curSec) };
    renderTimeSelectionOverlay();
  }
});
window.addEventListener('pointerup', (e) => {
  if (!selStartDrag) return;
  const wasMoved = selStartDrag.moved;
  const tapSec = selStartDrag.startSec;
  selStartDrag = null;
  if (!wasMoved) {
    if (timeSelection && tapSec >= timeSelection.start && tapSec <= timeSelection.end) {
      showSelectionMenu(e.clientX, e.clientY);
    } else {
      timeSelection = null;
      renderTimeSelectionOverlay();
    }
  }
});
function showSelectionMenu(x, y) {
  if (!timeSelection) return;
  showContextMenu(x, y, [
    { label:'Delete contents of selection', action: () => deleteSelectionContents(false) },
    { label:'Delete time selection (ripple)', danger:true, action: () => deleteSelectionContents(true) }
  ]);
}
function cutRangeFromClips(clips, cutStart, cutEnd) {
  const result = [];
  for (const c of clips) {
    const cStart = c.start, cEnd = c.start + c.duration;
    if (cEnd <= cutStart || cStart >= cutEnd) { result.push(c); continue; }
    if (cutStart <= cStart && cutEnd >= cEnd) { continue; }
    if (cutStart > cStart && cutEnd < cEnd) {
      const left = makeTrimmedClip(c, 0, cutStart-cStart, cStart);
      const right = makeTrimmedClip(c, cutEnd-cStart, c.duration, cutEnd);
      if (left) result.push(left);
      if (right) result.push(right);
      continue;
    }
    if (cutStart <= cStart) {
      const right = makeTrimmedClip(c, cutEnd-cStart, c.duration, cutEnd);
      if (right) result.push(right);
      continue;
    }
    const left = makeTrimmedClip(c, 0, cutStart-cStart, cStart);
    if (left) result.push(left);
  }
  return result;
}
function deleteSelectionContents(ripple) {
  if (!timeSelection) return;
  const { start, end } = timeSelection;
  const dur = end - start;
  pushUndoSnapshot();
  tracks.forEach(t => {
    let newClips = cutRangeFromClips(t.clips, start, end);
    if (ripple) {
      newClips = newClips.map(c => c.start >= end ? { ...c, start: c.start - dur } : c);
    }
    t.clips = newClips;
  });
  if (ripple) {
    if (playheadPos > end) playheadPos -= dur;
    else if (playheadPos > start) playheadPos = start;
  }
  if (activeEditClipId && !tracks.some(t => t.clips.some(c => c.id === activeEditClipId))) {
    activeEditClipId = null; activeEditType = null;
  }
  timeSelection = null;
  saveProject();
  renderAll();
}
ruler.addEventListener('pointerdown', (e) => {
  if (timeSelectionMode) { onSelectionPointerDown(e); return; }
  closeContextMenu(); exitEditMode(); onScrubStart(e);
});
window.addEventListener('pointermove', onScrubMove);
window.addEventListener('pointerup', onScrubEnd);

function onClipPointerDown(e, trackId, clip) {
  e.stopPropagation();
  if (timeSelectionMode) { onSelectionPointerDown(e); return; }
  closeContextMenu();
  if (activeEditClipId && activeEditClipId !== clip.id) exitEditMode();
  clipPress = { trackId, clipId: clip.id, startX:e.clientX, startY:e.clientY, moved:false, longPressFired:false };
  clipPress.timer = setTimeout(() => {
    if (!clipPress || clipPress.moved) return;
    clipPress.longPressFired = true;
    showClipContextMenu(trackId, clip.id, clipPress.startX, clipPress.startY);
  }, LONG_PRESS_MS);
}
function onEmptyLanePointerDown(e, trackId) {
  if (timeSelectionMode) { onSelectionPointerDown(e); return; }
  closeContextMenu();
  exitEditMode();
  emptyPress = { trackId, startX:e.clientX, startY:e.clientY, moved:false, longPressFired:false };
  emptyPress.timer = setTimeout(() => {
    if (!emptyPress || emptyPress.moved) return;
    emptyPress.longPressFired = true;
    if (clipboard) showPasteMenu(emptyPress.trackId, xToSec(emptyPress.startX), emptyPress.startX, emptyPress.startY);
  }, LONG_PRESS_MS);
}
window.addEventListener('pointermove', (e) => {
  if (clipPress && !clipPress.moved) {
    const dx = e.clientX-clipPress.startX, dy = e.clientY-clipPress.startY;
    if (Math.hypot(dx,dy) > MOVE_THRESHOLD) {
      clipPress.moved = true;
      clearTimeout(clipPress.timer);
      const t = tracks.find(t=>t.id===clipPress.trackId);
      const clip = t && t.clips.find(c=>c.id===clipPress.clipId);
      if (clip) {
        pushUndoSnapshot();
        dragState = { trackId:clipPress.trackId, id:clipPress.clipId, startX:clipPress.startX, origStart:clip.start, moved:true, snapped:true };
      }
    }
  }
  if (emptyPress && !emptyPress.moved) {
    const dx = e.clientX-emptyPress.startX, dy = e.clientY-emptyPress.startY;
    if (Math.hypot(dx,dy) > MOVE_THRESHOLD) {
      emptyPress.moved = true;
      clearTimeout(emptyPress.timer);
      // no scrub-start here: dragging empty track space no longer moves the playhead,
      // this just lets the browser's native horizontal scroll take over
    }
  }
});
window.addEventListener('pointerup', () => {
  if (clipPress) {
    clearTimeout(clipPress.timer);
    clipPress = null;
  }
  if (emptyPress) {
    clearTimeout(emptyPress.timer);
    emptyPress = null;
  }
});

function startFadeDrag(e, trackId, clip, edge) {
  e.stopPropagation();
  pushUndoSnapshot();
  fadeDragState = { trackId, id:clip.id, edge, startX:e.clientX, origFadeIn: clip.fadeIn||0, origFadeOut: clip.fadeOut||0 };
}
window.addEventListener('pointermove', (e) => {
  if (!fadeDragState) return;
  const dx = e.clientX - fadeDragState.startX;
  const deltaSec = dx / PPS;
  const t = tracks.find(t=>t.id===fadeDragState.trackId);
  const clip = t && t.clips.find(c=>c.id===fadeDragState.id);
  if (!clip) return;
  if (fadeDragState.edge === 'left') {
    const maxFadeIn = clip.duration - (clip.fadeOut||0);
    clip.fadeIn = Math.max(0, Math.min(maxFadeIn, fadeDragState.origFadeIn + deltaSec));
  } else {
    const maxFadeOut = clip.duration - (clip.fadeIn||0);
    clip.fadeOut = Math.max(0, Math.min(maxFadeOut, fadeDragState.origFadeOut - deltaSec));
  }
  renderLanes();
});
window.addEventListener('pointerup', () => {
  if (!fadeDragState) return;
  fadeDragState = null;
  saveProject();
});

function startTrimDrag(e, trackId, clip, edge) {
  e.stopPropagation();
  pushUndoSnapshot();
  trimDragState = {
    trackId, id: clip.id, edge, startX: e.clientX,
    origTrimIn: clip.trimIn, origTrimOut: clip.trimOut, origStart: clip.start
  };
}
window.addEventListener('pointermove', (e) => {
  if (!trimDragState) return;
  const dx = e.clientX - trimDragState.startX;
  const deltaSec = dx / PPS;
  const t = tracks.find(t=>t.id===trimDragState.trackId);
  const clip = t && t.clips.find(c=>c.id===trimDragState.id);
  if (!clip) return;
  const asset = getAsset(clip.assetId);
  if (!asset) return;
  if (trimDragState.edge === 'left') {
    let newTrimIn = trimDragState.origTrimIn + deltaSec;
    newTrimIn = Math.max(0, Math.min(newTrimIn, trimDragState.origTrimOut - MIN_CLIP_DUR));
    clip.trimIn = newTrimIn;
    clip.start = Math.max(0, trimDragState.origStart + (newTrimIn - trimDragState.origTrimIn));
    clip.duration = clip.trimOut - clip.trimIn;
  } else {
    let newTrimOut = trimDragState.origTrimOut + deltaSec;
    newTrimOut = Math.min(asset.buffer.duration, Math.max(newTrimOut, trimDragState.origTrimIn + MIN_CLIP_DUR));
    clip.trimOut = newTrimOut;
    clip.duration = clip.trimOut - clip.trimIn;
  }
  const visibleNow = sliceAudioBuffer(asset.buffer, clip.trimIn, clip.trimOut);
  clip.waveformUrl = makeWaveformUrl(visibleNow, Math.max(clip.duration*PPS, 28), ROW_H_JS-16);
  renderLanes();
});
window.addEventListener('pointerup', () => {
  if (!trimDragState) return;
  const t = tracks.find(t=>t.id===trimDragState.trackId);
  const clip = t && t.clips.find(c=>c.id===trimDragState.id);
  trimDragState = null;
  if (!clip || !t) return;
  const asset = getAsset(clip.assetId);
  if (asset) {
    const visible = sliceAudioBuffer(asset.buffer, clip.trimIn, clip.trimOut);
    clip.waveformUrl = makeWaveformUrl(visible, Math.max(clip.duration*PPS, 28), ROW_H_JS-16);
  }
  const newStart = clip.start, newEnd = newStart + clip.duration;
  const { toRemove, toAdd } = resolveOverlaps(t.clips, newStart, newEnd, clip.id);
  t.clips = t.clips.filter(c => !toRemove.includes(c.id));
  t.clips.push(...toAdd);
  saveProject();
  renderAll();
});
window.addEventListener('pointermove', (e) => {
  if (!dragState) return;
  const dx = e.clientX - dragState.startX;
  if (Math.abs(dx) > 3 && !dragState.moved) { dragState.moved = true; if (!dragState.snapped) { dragState.snapped = true; pushUndoSnapshot(); } }
  const deltaSec = dx/PPS;
  const t = tracks.find(t=>t.id===dragState.trackId);
  const clip = t && t.clips.find(c=>c.id===dragState.id);
  if (!clip) return;
  clip.start = Math.max(0, dragState.origStart + deltaSec);
  renderLanes();
});
window.addEventListener('pointerup', () => {
  if (!dragState) return;
  const t = tracks.find(t=>t.id===dragState.trackId);
  const clip = t && t.clips.find(c=>c.id===dragState.id);
  const wasMoved = dragState.moved;
  dragState = null;
  if (!clip || !t) return;
  if (!wasMoved) return;
  const newStart = clip.start, newEnd = newStart+clip.duration;
  const { toRemove, toAdd } = resolveOverlaps(t.clips, newStart, newEnd, clip.id);
  t.clips = t.clips.filter(c => !toRemove.includes(c.id));
  t.clips.push(...toAdd);
  saveProject();
  renderAll();
});

/* ---------- Rendering ---------- */
let liveBlockEl = null;
let clipBlockEls = new Map();
let lastRenderedTickCount = -1;
function renderPlayheadPosition() {
  playheadEl.style.left = (playheadPos*PPS)+'px';
  playheadRulerMark.style.left = (playheadPos*PPS)+'px';
}

function totalDurationNow() {
  let m = Math.max(8, playheadPos+2, isRecording ? takeStartPos+elapsed : 0);
  for (const t of tracks) for (const c of t.clips) m = Math.max(m, c.start+c.duration);
  return m;
}
function renderRuler() {
  const totalDuration = totalDurationNow();
  const tickCount = Math.ceil(totalDuration);
  lastRenderedTickCount = tickCount;
  const width = totalDuration*PPS + 40;
  timelineInner.style.width = width+'px';
  timelineInner.style.minWidth = '100%';
  ruler.style.width = width+'px';
  ruler.style.minWidth = '100%';
  ruler.style.transform = 'translateX(' + (-timelineOuter.scrollLeft) + 'px)';
  ruler.innerHTML = '';
  for (let i=0;i<=tickCount;i++) {
    const tick = document.createElement('div');
    tick.className='tick'; tick.style.left=(i*PPS)+'px';
    ruler.appendChild(tick);
    if (i%5===0) {
      const label = document.createElement('span');
      label.className='tick-label'; label.textContent=i+'s'; label.style.left=(i*PPS+3)+'px';
      ruler.appendChild(label);
    }
  }
  ruler.appendChild(playheadRulerMark);
  ruler.appendChild(selectionRulerMark);
  renderTimeSelectionOverlay();
}
function renderLanes() {
  renderRuler();
  lanesContainer.innerHTML = '';
  liveBlockEl = null;
  clipBlockEls.clear();
  tracks.forEach(t => {
    const lane = document.createElement('div');
    lane.className = 'track-lane';
    lane.addEventListener('pointerdown', (e) => { if (e.target===lane) onEmptyLanePointerDown(e, t.id); });
    if (t.clips.length===0 && !(isRecording && armedTrack() && armedTrack().id===t.id)) {
      const hint = document.createElement('span');
      hint.className='empty-hint'; hint.textContent='empty';
      lane.appendChild(hint);
    }
    t.clips.forEach((c, idx) => {
      const isTrimActive = activeEditClipId === c.id && activeEditType === 'trim';
      const isFadeActive = activeEditClipId === c.id && activeEditType === 'fade';
      const block = document.createElement('div');
      block.className = 'clip-block' + (dragState && dragState.id===c.id?' dragging':'') + ((isTrimActive||isFadeActive)?' fade-active':'');
      block.style.left = (c.start*PPS)+'px';
      block.style.width = Math.max(c.duration*PPS, 28)+'px';
      block.title = 'Clip '+(idx+1)+' — '+fmt(c.duration);
      if (c.waveformUrl) {
        block.style.backgroundImage = 'url(' + c.waveformUrl + ')';
        block.style.backgroundSize = '100% 100%';
        block.style.backgroundRepeat = 'no-repeat';
      }
      const numLabel = document.createElement('span');
      numLabel.style.position = 'absolute'; numLabel.style.left = '3px'; numLabel.style.top = '2px';
      numLabel.style.fontSize = '9px'; numLabel.style.opacity = '0.75';
      numLabel.textContent = idx+1;
      block.appendChild(numLabel);
      const widthPx = Math.max(c.duration*PPS, 28);
      const rowInnerH = ROW_H_JS - 16;
      const fadeInPx = Math.min((c.fadeIn||0)*PPS, widthPx);
      const fadeOutPx = Math.min((c.fadeOut||0)*PPS, widthPx);
      if (fadeInPx > 0 || fadeOutPx > 0) {
        const svgHtml = '<svg width="'+widthPx+'" height="'+rowInnerH+'" viewBox="0 0 '+widthPx+' '+rowInnerH+
          '" style="position:absolute;left:0;top:0;pointer-events:none;">'+
          '<polyline points="0,'+rowInnerH+' '+fadeInPx+',0 '+(widthPx-fadeOutPx)+',0 '+widthPx+','+rowInnerH+
          '" fill="none" stroke="#f4d03f" stroke-width="2"/></svg>';
        const svgWrap = document.createElement('div');
        svgWrap.innerHTML = svgHtml;
        block.appendChild(svgWrap.firstChild);
      }
      block.addEventListener('pointerdown', (e) => onClipPointerDown(e, t.id, c));
      clipBlockEls.set(c.id, block);
      if (isTrimActive) {
        const leftHandle = document.createElement('div');
        leftHandle.className = 'trim-handle left';
        leftHandle.addEventListener('pointerdown', (e) => startTrimDrag(e, t.id, c, 'left'));
        block.appendChild(leftHandle);
        const rightHandle = document.createElement('div');
        rightHandle.className = 'trim-handle right';
        rightHandle.addEventListener('pointerdown', (e) => startTrimDrag(e, t.id, c, 'right'));
        block.appendChild(rightHandle);
      }
      if (isFadeActive) {
        const fLeft = document.createElement('div');
        fLeft.className = 'fade-handle left';
        fLeft.addEventListener('pointerdown', (e) => startFadeDrag(e, t.id, c, 'left'));
        block.appendChild(fLeft);
        const fRight = document.createElement('div');
        fRight.className = 'fade-handle right';
        fRight.addEventListener('pointerdown', (e) => startFadeDrag(e, t.id, c, 'right'));
        block.appendChild(fRight);
      }
      lane.appendChild(block);
    });
    if (isRecording) {
      const armed = armedTrack();
      if (armed && armed.id===t.id) {
        const live = document.createElement('div');
        live.className='live-block';
        live.style.left = (takeStartPos*PPS)+'px';
        live.style.width = Math.max(elapsed*PPS, 4)+'px';
        lane.appendChild(live);
        liveBlockEl = live;
      }
    }
    lanesContainer.appendChild(lane);
  });
  renderPlayheadPosition();
}
function renderHeaders() {
  headersList.innerHTML = '';
  tracks.forEach(t => {
    const h = document.createElement('div');
    h.className = 'track-header';
    const top = document.createElement('div'); top.className='th-top';
    const armBtn = document.createElement('button');
    armBtn.className = 'arm-btn' + (t.armed?' armed':'');
    armBtn.title = 'Arm for recording';
    armBtn.addEventListener('click', () => setArmed(t.id));
    const nameEl = document.createElement('div'); nameEl.className='th-name'; nameEl.textContent=t.name;
    const delBtn = document.createElement('button');
    delBtn.className='ms-btn'; delBtn.textContent='✕'; delBtn.title='Delete track';
    delBtn.style.marginLeft='auto';
    delBtn.addEventListener('click', () => deleteTrack(t.id));
    top.appendChild(armBtn); top.appendChild(nameEl); top.appendChild(delBtn);

    const controls = document.createElement('div'); controls.className='th-controls';
    const muteBtn = document.createElement('button');
    muteBtn.className = 'ms-btn' + (t.muted?' mute-on':'');
    muteBtn.textContent = 'M';
    muteBtn.addEventListener('click', () => toggleMute(t.id));
    const soloBtn = document.createElement('button');
    soloBtn.className = 'ms-btn' + (t.soloed?' solo-on':'');
    soloBtn.textContent = 'S';
    soloBtn.addEventListener('click', () => toggleSolo(t.id));
    const vol = document.createElement('input');
    vol.type='range'; vol.min='0'; vol.max='1'; vol.step='0.01'; vol.value=t.volume;
    vol.className='vol-slider';
    vol.addEventListener('input', (e) => setVolume(t.id, parseFloat(e.target.value)));
    controls.appendChild(muteBtn); controls.appendChild(soloBtn); controls.appendChild(vol);

    h.appendChild(top); h.appendChild(controls);
    headersList.appendChild(h);
  });
}
function renderAll() { renderHeaders(); renderLanes(); renderAssetList(); }
addTrackBtn.addEventListener('click', () => addTrack());

/* ---------- Persistence (multi-project) ---------- */
const DB_NAME='tapeDB', DB_VERSION=2, STORE='project';
let activeProjectId = null;
let projectList = [];
function openDB() {
  return new Promise((resolve,reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = () => { if (!req.result.objectStoreNames.contains(STORE)) req.result.createObjectStore(STORE); };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
function getKey(db, key) {
  return new Promise((resolve,reject) => {
    const tx = db.transaction(STORE,'readonly');
    const req = tx.objectStore(STORE).get(key);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
function putKey(db, key, val) {
  return new Promise((resolve,reject) => {
    const tx = db.transaction(STORE,'readwrite');
    tx.objectStore(STORE).put(val, key);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}
function deleteKeyFn(db, key) {
  return new Promise((resolve,reject) => {
    const tx = db.transaction(STORE,'readwrite');
    tx.objectStore(STORE).delete(key);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}
let saveTimer=null;
async function doSaveNow() {
  if (!window.indexedDB || !activeProjectId) return;
  try {
    const db = await openDB();
    const serialAssets = await Promise.all(projectAssets.map(async a => ({
      id:a.id, name:a.name, mimeType:a.blob.type, data: await a.blob.arrayBuffer()
    })));
    const serialTracks = tracks.map(t => ({
      id:t.id, name:t.name, volume:t.volume, muted:t.muted, soloed:t.soloed, armed:t.armed,
      clips: t.clips.map(c => ({ id:c.id, assetId:c.assetId, start:c.start, duration:c.duration, trimIn:c.trimIn, trimOut:c.trimOut, fadeIn:c.fadeIn||0, fadeOut:c.fadeOut||0 }))
    }));
    await putKey(db, 'proj:'+activeProjectId, { assets: serialAssets, tracks: serialTracks, playheadPos });
    savedTag.style.opacity='1';
    setTimeout(()=> savedTag.style.opacity='0', 1200);
  } catch (e) { console.error('save failed', e); }
}
function saveProject() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(doSaveNow, 300);
}
async function flushSaveNow() {
  clearTimeout(saveTimer);
  await doSaveNow();
}
function teardownCurrentTracks() {
  tracks.forEach(t => { try { t.gainNode.disconnect(); } catch(e){} });
}
async function applyProjectRecord(record) {
  const ctx = ensureAudioCtx();
  projectAssets = [];
  const isOldFormat = !record.assets;
  if (!isOldFormat) {
    for (const sa of record.assets) {
      const blob = new Blob([sa.data], { type: sa.mimeType });
      const buffer = await ctx.decodeAudioData(sa.data.slice(0));
      projectAssets.push({ id: sa.id, name: sa.name, blob, buffer, mimeType: sa.mimeType, size: sa.data.byteLength });
    }
  }
  for (const st of (record.tracks||[])) {
    const gainNode = ctx.createGain(); gainNode.connect(ctx.destination);
    const track = { id:st.id, name:st.name, volume:st.volume, muted:st.muted, soloed:st.soloed, armed:st.armed, gainNode, clips:[] };
    for (const sc of st.clips) {
      let assetId, trimIn, trimOut;
      if (isOldFormat) {
        // migrate: each old clip embedded its own full audio blob directly
        const blob = new Blob([sc.data], { type: sc.mimeType });
        const buffer = await ctx.decodeAudioData(sc.data.slice(0));
        assetId = genId();
        projectAssets.push({ id: assetId, name: 'Recording ' + (projectAssets.length+1), blob, buffer, mimeType: sc.mimeType, size: sc.data.byteLength });
        trimIn = typeof sc.trimIn === 'number' ? sc.trimIn : 0;
        trimOut = typeof sc.trimOut === 'number' ? sc.trimOut : sc.duration;
      } else {
        assetId = sc.assetId;
        trimIn = sc.trimIn; trimOut = sc.trimOut;
      }
      const asset = getAsset(assetId);
      if (!asset) continue;
      const visible = sliceAudioBuffer(asset.buffer, trimIn, trimOut);
      track.clips.push({ id:sc.id, assetId, start:sc.start, duration:sc.duration, trimIn, trimOut,
        fadeIn: sc.fadeIn||0, fadeOut: sc.fadeOut||0,
        waveformUrl: makeWaveformUrl(visible, Math.max(sc.duration*PPS, 28), ROW_H_JS-16) });
    }
    tracks.push(track);
  }
  playheadPos = record.playheadPos || 0;
  if (!tracks.some(t=>t.armed) && tracks.length) tracks[0].armed = true;
  applyTrackGains();
  renderAll();
  renderAssetList();
}
async function saveMetaNow() {
  if (!window.indexedDB) return;
  const db = await openDB();
  await putKey(db, 'meta', { activeId: activeProjectId, projects: projectList });
}
async function switchProject(id) {
  if (id === activeProjectId) return;
  if (isRecording) stopRecording();
  if (playing) stopPlayback();
  await flushSaveNow();
  teardownCurrentTracks();
  tracks = [];
  activeEditClipId = null; activeEditType = null; undoStack = []; redoStack = [];
  activeProjectId = id;
  const db = await openDB();
  const rec = await getKey(db, 'proj:'+id) || { tracks: [], playheadPos: 0 };
  await applyProjectRecord(rec);
  if (tracks.length === 0) addTrack();
  await saveMetaNow();
}
async function createProject() {
  if (isRecording) stopRecording();
  if (playing) stopPlayback();
  await flushSaveNow();
  teardownCurrentTracks();
  const id = genId();
  const name = 'Project ' + (projectList.length+1);
  projectList.push({id, name});
  tracks = []; activeEditClipId=null; activeEditType=null; undoStack=[]; redoStack=[]; playheadPos=0; projectAssets = [];
  activeProjectId = id;
  addTrack();
  await saveMetaNow();
  renderAssetList();
}
async function renameProject(id, newName) {
  const p = projectList.find(p=>p.id===id);
  if (!p) return;
  p.name = newName;
  await saveMetaNow();
}
async function deleteProject(id) {
  if (projectList.length <= 1) { showNotice("Can't delete the only project."); return; }
  const db = await openDB();
  await deleteKeyFn(db, 'proj:'+id);
  projectList = projectList.filter(p=>p.id!==id);
  if (activeProjectId === id) {
    await switchProject(projectList[0].id);
  } else {
    await saveMetaNow();
  }
}
async function initProjects() {
  if (!window.indexedDB) { addTrack(); renderAll(); return; }
  try {
    const db = await openDB();
    let meta = await getKey(db, 'meta');
    if (!meta) {
      const old = await getKey(db, 'current');
      const id = genId();
      const rec = (old && old.tracks && old.tracks.length) ? old : { tracks: [], playheadPos: 0 };
      await putKey(db, 'proj:'+id, rec);
      meta = { activeId: id, projects: [{id, name:'Project 1'}] };
      await putKey(db, 'meta', meta);
    }
    activeProjectId = meta.activeId;
    projectList = meta.projects;
    const projRecord = await getKey(db, 'proj:'+activeProjectId) || { tracks: [], playheadPos: 0 };
    await applyProjectRecord(projRecord);
    if (tracks.length === 0) addTrack();
  } catch (e) {
    console.error('init failed', e);
    addTrack(); renderAll();
  }
}

updateGainKnobVisual();
initProjects();
